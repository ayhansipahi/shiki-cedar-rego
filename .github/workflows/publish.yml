name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify tag matches package.json version
        env:
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${GIT_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${PKG}. Bump version, commit, then tag again."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version already on npm
        id: registry
        run: |
          PKG=$(node -p "require('./package.json').version")
          REMOTE=$(npm view "shiki-cedar-rego@${PKG}" version 2>/dev/null || echo "")
          if [ "$REMOTE" = "$PKG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PKG is already published on npm; skipping publish." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.registry.outputs.skip != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
